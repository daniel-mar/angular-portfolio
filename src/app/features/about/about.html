@if (profile(); as data) {
  <div class="about-page-wrapper">
    
    <div class="profile-image-container">
      <img [src]="data.avatarUrl" [alt]="data.title" class="profile-img">
    </div>

    <div class="about-content-container">
      <h1>{{ data.title }}</h1>
      <p class="intro">{{ data.headline }}</p>
      <p class="details">{{ data.biography1 }}</p>
      <p class="details">{{ data.biography2 }}</p>
    </div>

  </div>
}
