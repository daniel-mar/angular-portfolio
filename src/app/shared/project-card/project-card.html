<div class="card">
    <img [src]="project.imageUrl" [alt]="project.title" class="card-image">
    <div class="card-body">
        <h3 class="card-title">{{ project.title }}</h3>
        <p class="card-description">{{ project.description }}</p>

        <div class="tech-container">
            @for (tech of project.technologies; track tech) {
            <span class="tech-tag">
                {{ tech }}
            </span>
            }
        </div>

        <div class="link-container">
            <a [href]="project.githubLink" class="link-btn github" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a [href]="project.liveLink" class="link-btn live" target="_blank" rel="noopener noreferrer">Live Demo</a>
        </div>
    </div>
</div>
